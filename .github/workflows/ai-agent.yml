name: AI-Agent

on:
  discussion_comment:
    types: [created, edited]
  discussion:
    types: [created, edited]
    
permissions:
  discussions: write
  contents: write
  pull-requests: write

concurrency:
  group: ai-agent-${{ github.event.action }}-${{ github.actor.login || github.run_id }}
  cancel-in-progress: false

jobs:
  gemini_respond:
    if: >
      github.event_name == 'discussion_comment' && contains(github.event.comment.body, '@ai-agent-net') ||
      github.event_name == 'discussion' && contains(github.event.discussion.body, '@ai-agent-net')
    runs-on: ubuntu-latest
    steps:

      - uses: Val-d-emar/gemini-discussions-agent@dev
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.AI_AGENT_PAT }}
          agent_language: "Russian"
          agent_model: "flash"
