name: Discussions Notifier

on:
  discussion_comment:
    types: [created, edited]
  discussion:
    types: [created]

permissions:
  discussions: read
  contents: read

concurrency:
  group: th-notify-${{ github.event.action }}-${{ github.actor.login || github.run_id }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: Val-d-emar/discussions-tg-notifications@main
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          # message_thread_id: "12345" # Опционально для топиков
          language: "ru"
          events: "created,edited"
